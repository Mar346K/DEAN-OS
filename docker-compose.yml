version: '3.8'

services:
  # 1. The Vector Vault (Mnemosyne)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: deanos_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - swarm_net
    restart: unless-stopped

  # 2. The Message Broker (Task Queues)
  redis:
    image: redis:alpine
    container_name: deanos_redis
    ports:
      - "6380:6379"
    networks:
      - swarm_net
    restart: unless-stopped

  # 3. The Source of Truth (Relational Data) - NEW for Phase 25
  db:
    image: postgres:16-alpine
    container_name: deanos_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - swarm_net
    restart: unless-stopped

  # --- THE 3 PYTHON MICROSERVICES ---
  api:
    build:
      context: .
      dockerfile: services-python/Dockerfile
    container_name: deanos_api
    command: ["uvicorn", "sycophant.manager:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - AETHELGARD_HOST=aethelgard
      - OUBLIETTE_HOST=oubliette
      - OLLAMA_HOST=host.docker.internal
      # Inject the Postgres connection string from the .env file
      - DATABASE_URL=${DATABASE_URL}
    volumes:
      - ./services-python:/app
      - ./workspace:/app/workspace
      - ./staging:/app/staging
      - ./infrastructure:/app/infrastructure
      - //var/run/docker.sock:/var/run/docker.sock # <--- ADD THIS LINE
    depends_on:
      - qdrant
      - redis
      - db # Wait for Postgres
      - mnemosyne
      - oubliette
    networks:
      - swarm_net

  # --- THE ASYNC WORKER (Phase 26) ---
  worker:
    build:
      context: .
      dockerfile: services-python/Dockerfile
    container_name: deanos_worker
    # Instead of a web server, we start a Celery worker targeting the 'sycophant.tasks' module
    command: ["celery", "-A", "sycophant.tasks", "worker", "--loglevel=info", "--pool=threads", "--concurrency=4"]
    environment:
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - AETHELGARD_HOST=aethelgard
      - OUBLIETTE_HOST=oubliette
      - OLLAMA_HOST=host.docker.internal
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=redis://redis:6379/0
    volumes:
      - ./services-python:/app
      - ./workspace:/app/workspace
      - ./staging:/app/staging
      - ./infrastructure:/app/infrastructure
    depends_on:
      - redis
      - db
      - oubliette
    networks:
      - swarm_net

  mnemosyne:
    build:
      context: .
      dockerfile: services-python/Dockerfile
    container_name: deanos_mnemosyne
    command: ["uvicorn", "mnemosyne.app:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    ports:
      - "8001:8001"
    volumes:
      - ./services-python:/app
      - ./storage:/app/storage
      - ./docs:/app/docs
    depends_on:
      - qdrant
    networks:
      - swarm_net

  oubliette:
    build:
      context: .
      dockerfile: services-python/Dockerfile
    container_name: deanos_oubliette
    command: ["uvicorn", "oubliette.app:app", "--host", "0.0.0.0", "--port", "8002"]
    ports:
      - "8002:8002"
    environment:
      # [FIX] Pass the absolute HOST path to the base staging folder
      - HOST_STAGING_PATH=${PWD}/staging/projects
      - HOST_WORKSPACE_PATH=${PWD}/staging/workspace
    volumes:
      - ./services-python:/app
      - //var/run/docker.sock:/var/run/docker.sock  # Ensure this double slash is here for Windows!
      - ./infrastructure:/app/infrastructure
      - ./staging:/app/staging # <--- ADD THIS LINE
    networks:
      - swarm_net

  # --- UI & HARDWARE ---
  ui:
    build:
      context: ./mission-control
      dockerfile: Dockerfile
    container_name: deanos_ui
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./mission-control/src:/app/src
    depends_on:
      - api
    networks:
      - swarm_net

  aethelgard:
    build:
      context: ./services-rust/aethelgard
      dockerfile: Dockerfile
    container_name: deanos_aethelgard
    ports:
      - "8003:8003"
    networks:
      - swarm_net
    privileged: true

networks:
  swarm_net:
    driver: bridge

volumes:
  qdrant_storage:
  postgres_data: # Ensure database records survive restarts
